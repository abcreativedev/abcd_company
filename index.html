<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABCD · Anne van den Bosch Creative Development</title>
<meta name="description" content="ABCD - Anne van den Bosch Creative Development. Design. Family. Experience.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F8F5EF;color:#173F35;font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.bg{position:fixed;pointer-events:none}
main{text-align:center;padding:40px;position:relative;z-index:1}
.hex{margin:0 auto 36px}
.letters{font-weight:600;fill:#173F35}
.wordmark{color:#C6A15B;font-size:24px;letter-spacing:5px;font-weight:500;margin-bottom:28px;line-height:1.8}
.ohex{width:.85em;height:.85em;vertical-align:-.08em}
.line{width:48px;height:2px;background:#C6A15B;margin:0 auto 32px}
.rol{font-size:19px;margin-bottom:30px}
.dots{display:flex;gap:14px;justify-content:center;margin-bottom:44px}
.dots span{width:8px;height:8px;border-radius:50%;opacity:.55}
footer{font-size:12px;letter-spacing:2px;opacity:.6}
</style>
</head>
<body>
<main>
<svg class="hex" width="220" height="220" viewBox="0 0 100 100"><polygon points="50,3 93,26.5 93,73.5 50,97 7,73.5 7,26.5" fill="none" stroke="#173F35" stroke-width="2.2"/><text x="32" y="41" text-anchor="middle" class="letters" font-size="22">A</text><text x="68" y="41" text-anchor="middle" class="letters" font-size="22">B</text><text x="32" y="73" text-anchor="middle" class="letters" font-size="22">C</text><text x="68" y="73" text-anchor="middle" class="letters" font-size="22">D</text></svg>
<p class="wordmark">ANNE VAN DEN B<svg class="ohex" viewBox="0 0 100 100"><polygon points="50,3 93,26.5 93,73.5 50,97 7,73.5 7,26.5" fill="none" stroke="#C6A15B" stroke-width="11"/></svg>SCH<br>CREATIVE DEVELOPMENT</p>
<div class="line"></div>
<p class="rol">Design. Family. Experience.</p>
<div class="dots"><span style="background:#C85A42"></span><span style="background:#E5A949"></span><span style="background:#8DAD6F"></span><span style="background:#2D968C"></span><span style="background:#4C7AB8"></span><span style="background:#9868A2"></span></div>
<footer>KVK [NUMMER VOLGT]</footer>
</main>
<script>
let s=36;
const rnd=()=>{s=Math.sin(s)*10000;return s-Math.floor(s);};
const P='50,3 93,26.5 93,73.5 50,97 7,73.5 7,26.5';
let i=0;
for(let r=0;r<5;r++){
 for(let c=0;c<7;c++){
  if(i++>=35)break;
  const size=(4+rnd()*5).toFixed(1);
  const left=(c*14.3+0.5+rnd()*4).toFixed(1);
  const top=(r*20+0.5+rnd()*8).toFixed(1);
  const kleur=rnd()>.5?'#C6A15B':'#173F35';
  const op=(0.05+rnd()*0.05).toFixed(3);
  const el=document.createElementNS('http://www.w3.org/2000/svg','svg');
  el.setAttribute('class','bg');
  el.setAttribute('viewBox','0 0 100 100');
  el.setAttribute('style','left:'+left+'vw;top:'+top+'vh;width:'+size+'vmin;height:'+size+'vmin');
  el.innerHTML='<polygon points="'+P+'" fill="none" stroke="'+kleur+'" stroke-opacity="'+op+'" stroke-width="1.5"/>';
  document.body.insertBefore(el,document.querySelector('main'));
 }
}
</script>
</body>
</html>
