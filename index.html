<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ABCD · Anne van den Bosch Creative Development</title>
<meta name="description" content="ABCD - Anne van den Bosch Creative Development. Ontwikkelt en beheert digitale producten en merken.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F8F5EF;color:#173F35;font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.bg{position:fixed;pointer-events:none}
main{text-align:center;padding:40px;position:relative;z-index:1}
.hex{margin:0 auto 36px}
.letters{font-weight:600;fill:#C6A15B}
.wordmark{color:#C6A15B;font-size:15px;letter-spacing:4px;font-weight:500;margin-bottom:28px;line-height:1.9}
.ohex{width:.85em;height:.85em;vertical-align:-.08em}
.line{width:48px;height:2px;background:#C6A15B;margin:0 auto 32px}
.rol{font-size:19px;margin-bottom:30px}
.dots{display:flex;gap:14px;justify-content:center;margin-bottom:44px}
.dots span{width:8px;height:8px;border-radius:50%;opacity:.55}
footer{font-size:12px;letter-spacing:2px;opacity:.6;line-height:2.2}
</style>
</head>
<body>
<main>
<svg class="hex" width="220" height="220" viewBox="0 0 100 100"><polygon points="50,3 93,26.5 93,73.5 50,97 7,73.5 7,26.5" fill="#173F35" stroke="#C6A15B" stroke-width="3.5"/><text x="39" y="46" text-anchor="middle" class="letters" font-size="19">A</text><text x="61" y="46" text-anchor="middle" class="letters" font-size="19">B</text><text x="39" y="68" text-anchor="middle" class="letters" font-size="19">C</text><text x="61" y="68" text-anchor="middle" class="letters" font-size="19">D</text></svg>
<p class="wordmark">ANNE VAN DEN B<svg class="ohex" viewBox="0 0 100 100"><polygon points="50,3 93,26.5 93,73.5 50,97 7,73.5 7,26.5" fill="none" stroke="#C6A15B" stroke-width="11"/></svg>SCH<br>CREATIVE DEVELOPMENT</p>
<div class="line"></div>
<p class="rol">Design. Family. Experience.</p>
<div class="dots"><span style="background:#C85A42"></span><span style="background:#E5A949"></span><span style="background:#8DAD6F"></span><span style="background:#2D968C"></span><span style="background:#4C7AB8"></span><span style="background:#9868A2"></span></div>
<footer>ANNE VAN DEN BOSCH<br>CREATIVE DEVELOPMENT<br>KVK [NUMMER VOLGT]</footer>
</main>
<script>
let s=36;
const rnd=()=>{s=Math.sin(s)*10000;return s-Math.floor(s);};
const P='50,3 93,26.5 93,73.5 50,97 7,73.5 7,26.5';
for(let i=0;i<35;i++){
  const size=Math.round(40+rnd()*280);
  const x=Math.round(rnd()*110-8);
  const y=Math.round(rnd()*110-8);
  const goud=rnd()>.5;
  const kleur=goud?'#C6A15B':'#173F35';
  const op=(0.03+rnd()*0.05).toFixed(3);
  const el=document.createElementNS('http://www.w3.org/2000/svg','svg');
  el.setAttribute('class','bg');
  el.setAttribute('width',size);el.setAttribute('height',size);
  el.setAttribute('viewBox','0 0 100 100');
  el.setAttribute('style','left:'+x+'vw;top:'+y+'vh');
  el.innerHTML='<polygon points="'+P+'" fill="none" stroke="'+kleur+'" stroke-opacity="'+op+'" stroke-width="1"/>';
  document.body.insertBefore(el,document.querySelector('main'));
}
</script>
</body>
</html>
